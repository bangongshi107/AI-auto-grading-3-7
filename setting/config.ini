	答案：如果只知道自私而不爱百姓/人民，这就是违背、抛弃/失去了万物同源的道理。
	
	评分细则：1、关键词“但”翻译为“只”（意思对即可），给1分
	2、关键词“悖”翻译为“违背”（意思对即可），给1分
	3、句子大意正确，表达完整给2分。
	
	宽松给分。但是绝大部分学生很难得满分，给满分要慎重。此题步长1，只给整数得分。
